<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📺 IPTV Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 15px;
        }
        .container {
            background: #111;
            padding: 30px 25px;
            border-radius: 24px;
            max-width: 420px;
            width: 100%;
            border: 1px solid #2a2a2a;
            box-shadow: 0 20px 60px rgba(255, 136, 0, 0.08);
            text-align: center;
        }
        .header {
            padding-bottom: 20px;
            border-bottom: 1px solid #222;
        }
        .header .icon {
            font-size: 50px;
            display: block;
            margin-bottom: 5px;
        }
        .header h1 {
            color: #00ff88;
            font-size: 24px;
            font-weight: 700;
        }
        .header .badge {
            display: inline-block;
            background: #ff3333;
            color: #fff;
            font-size: 10px;
            padding: 3px 12px;
            border-radius: 20px;
            margin-top: 5px;
            animation: blink 1.2s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .header p {
            color: #666;
            font-size: 13px;
            margin-top: 6px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            width: 100%;
            color: #fff;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn .emoji {
            font-size: 24px;
        }
        .btn-vlc {
            background: linear-gradient(145deg, #ff8800, #e67600);
            box-shadow: 0 4px 20px rgba(255, 136, 0, 0.3);
        }
        .btn-vlc:active {
            box-shadow: 0 2px 10px rgba(255, 136, 0, 0.5);
        }
        .btn-mx {
            background: linear-gradient(145deg, #e74c3c, #c0392b);
            box-shadow: 0 4px 20px rgba(231, 76, 60, 0.25);
        }
        .btn-mx:active {
            box-shadow: 0 2px 10px rgba(231, 76, 60, 0.4);
        }
        .btn-ios-vlc {
            background: linear-gradient(145deg, #ff6b6b, #ee5a24);
            box-shadow: 0 4px 20px rgba(238, 90, 36, 0.25);
            border: 1px solid #ff8800;
        }
        .btn-ios-vlc:active {
            box-shadow: 0 2px 10px rgba(238, 90, 36, 0.4);
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 6px 0 4px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #222;
        }
        .divider span {
            color: #444;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .footer {
            text-align: center;
            color: #333;
            font-size: 10px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #1a1a1a;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff88;
            color: #000;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
            z-index: 999;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }
        .toast.show {
            opacity: 1;
        }
        .note {
            color: #555;
            font-size: 11px;
            text-align: center;
            margin-top: 12px;
            line-height: 1.8;
        }
        .note strong {
            color: #00ff88;
        }
        .platform-badge {
            display: inline-block;
            font-size: 9px;
            background: #222;
            padding: 2px 10px;
            border-radius: 10px;
            color: #666;
            margin-left: 6px;
        }
        @media (max-width: 400px) {
            .btn {
                font-size: 16px;
                padding: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <span class="icon">📡</span>
            <h1>IPTV Live</h1>
            <span class="badge">● LIVE</span>
            <p id="subText">اختر التطبيق لفتح البث</p>
        </div>

        <div class="btn-group">

            <!-- ===== VLC (Android) ===== -->
            <a href="intent://arena940.xyz/live/018e49b001/4c0706010b/983525.ts#Intent;scheme=http;package=org.videolan.vlc;type=video/*;end" class="btn btn-vlc" id="btnVLCAndroid">
                <span class="emoji">🎬</span>
                فتح في VLC (Android)
                <span class="platform-badge">🤖</span>
            </a>

            <!-- ===== VLC (iPhone) ===== -->
            <a href="vlc://http://arena940.xyz/live/018e49b001/4c0706010b/983525.ts" class="btn btn-ios-vlc" id="btnVLCiOS">
                <span class="emoji">🎬</span>
                فتح في VLC (iPhone)
                <span class="platform-badge">🍏</span>
            </a>

            <!-- ===== MX Player (Android) ===== -->
            <a href="intent://arena940.xyz/live/018e49b001/4c0706010b/983525.ts#Intent;scheme=http;package=com.mxtech.videoplayer.ad;type=video/*;end" class="btn btn-mx" id="btnMX">
                <span class="emoji">▶️</span>
                فتح في MX Player
                <span class="platform-badge">🤖</span>
            </a>

            <div class="divider"><span>📌 ملاحظة</span></div>

            <p style="color:#666;font-size:12px;margin:5px 0;">
                🔹 اختر التطبيق المناسب لنظام تشغيل جهازك<br>
                🔹 إذا لم يعمل، تأكد من تثبيت التطبيق أولاً
            </p>

        </div>

        <p class="note" id="deviceNote">
            💡 اختر التطبيق المناسب لجهازك
        </p>
        <div class="footer">⚡ IPTV Proxy | يعمل على iPhone و Android</div>
    </div>

    <div id="toast" class="toast">✅ جاري الفتح...</div>

    <script>
        const STREAM_URL = "http://arena940.xyz/live/018e49b001/4c0706010b/983525.ts";

        // ===== كشف نوع الجهاز =====
        function getDeviceType() {
            const ua = navigator.userAgent.toLowerCase();
            if (/iphone|ipad|ipod/.test(ua)) return 'ios';
            if (/android/.test(ua)) return 'android';
            return 'other';
        }

        const device = getDeviceType();

        // ===== عرض الأزرار المناسبة للجهاز =====
        const note = document.getElementById('deviceNote');
        const subText = document.getElementById('subText');

        if (device === 'ios') {
            // إخفاء أزرار Android
            document.getElementById('btnVLCAndroid').style.display = 'none';
            document.getElementById('btnMX').style.display = 'none';
            document.querySelector('.divider').style.display = 'none';
            note.innerHTML = '🍏 <strong>iPhone/iPad:</strong> استخدم زر <strong>VLC (iPhone)</strong>';
            subText.textContent = 'اضغط الزر لفتح البث في VLC';
        } else if (device === 'android') {
            // إخفاء زر iPhone
            document.getElementById('btnVLCiOS').style.display = 'none';
            note.innerHTML = '🤖 <strong>Android:</strong> استخدم <strong>VLC</strong> أو <strong>MX Player</strong>';
            subText.textContent = 'اختر التطبيق لفتح البث';
        } else {
            note.innerHTML = '💡 استخدم <strong>VLC</strong> أو <strong>MX Player</strong>';
            subText.textContent = 'اختر التطبيق لفتح البث';
        }

        // ===== دالة الإشعار =====
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        console.log('📺 IPTV Player');
        console.log('📱 يعمل على iPhone و Android');
        console.log('🎬 VLC + MX Player');
    </script>

</body>
</html>
